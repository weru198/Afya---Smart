<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AfyaSmart</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">AfyaSmart</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="publicNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="login.html">Login</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link btn btn-light text-success ms-2" href="register.html">
                        Register
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>


    <!-- Login Form -->
    <section class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5">
            <div class="card shadow p-4">
                <h3 class="text-center mb-4 text-success">Login</h3>

               <form action="backend/login.php" method="POST">

    <div class="mb-3">
        <label>Email Address</label>
        <input 
            type="email" 
            name="email" 
            class="form-control" 
            placeholder="Enter email" 
            required
        >
    </div>

    <div class="mb-3">
        <label>Password</label>
        <input 
            type="password" 
            name="password" 
            class="form-control" 
            placeholder="Enter password" 
            required
        >
    </div>

    <button type="submit" class="btn btn-success w-100">
        Login
    </button>
</form>


                <p class="text-center mt-3">
                    Don’t have an account?
                    <a href="register.html" class="text-success fw-bold">Register</a>
                </p>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your AfyaSmart account to manage student healthcare tools in one place.">
    <meta name="theme-color" content="#0b5f49">
    <meta property="og:title" content="AfyaSmart">
    <meta property="og:description" content="Create your AfyaSmart account to manage student healthcare tools in one place.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Register | AfyaSmart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-body page-auth">
<nav class="navbar navbar-expand-lg navbar-dark glass-nav">
    <div class="container">
        <a class="navbar-brand" href="index.html"><span class="brand-mark"><i class="bi bi-plus-lg"></i></span><span>AfyaSmart</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNav" aria-controls="publicNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="publicNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="auth-wrap">
    <div class="auth-panel">
        <h3 class="mb-1">Create your account</h3>
        <p class="text-secondary mb-4">Set up your student health workspace in less than a minute.</p>

        <div id="authNotice" class="alert d-none" role="alert"></div>

        <form action="backend/register.php" method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>

            <button type="submit" class="btn btn-success w-100"><i class="bi bi-person-plus"></i>Register</button>
        </form>

        <p class="mt-3 mb-0">Already registered? <a href="login.html" class="fw-bold text-success">Sign in</a></p>
    </div>
</main>

<footer class="site-footer">
    <p class="mb-0">AfyaSmart professional web experience.</p>
</footer>

<script>
(function () {
    const notice = document.getElementById("authNotice");
    if (!notice) return;

    const status = new URLSearchParams(window.location.search).get("status");
    const map = {
        missing: ["Please fill in all fields.", "alert-warning"],
        invalid_email: ["Please use a valid email address.", "alert-warning"],
        weak_password: ["Password must be at least 6 characters.", "alert-warning"],
        email_exists: ["That email is already registered. Use a different email.", "alert-danger"],
        error: ["Registration failed. Please try again.", "alert-danger"]
    };

    if (status && map[status]) {
        notice.textContent = map[status][0];
        notice.classList.remove("d-none");
        notice.classList.add(map[status][1]);
    }
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
